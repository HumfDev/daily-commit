# Global settings for daily-commit. Per-repo overrides live in repos.yml.
#
# TEMP TESTING MODE: probabilities/gates disabled so every run can act.
# Restore production values before shipping (runProbability 0.35, quietHours
# [0-5], maxActionsPerDay 2, weighted actions + noop, cooldownHours 20).

# Probability [0-1] that ANY action runs on a given scheduler tick.
runProbability: 1

# Hours (0-23, UTC) during which daily-commit will never act.
quietHours: []

# Max number of actions (summed across all repos) performed per calendar day.
maxActionsPerDay: 100

# Relative weights used when choosing an action type.
# Equal weights + noop: 0 so every tick does a real action.
actionWeights:
  commit: 1
  pull_request: 1
  review: 1
  issue: 1
  noop: 0

# Default safe paths the commit/pull_request actions are allowed to touch.
safePaths:
  - "docs/**"
  - "*.md"
  - "CHANGELOG.md"
  - ".github/**"

# Minimum hours between two actions of the same type on the same repo.
cooldownHours: 0

# Git commit author identity. Commits attribute to this GitHub account
# (avatar + username) when the email matches a verified address on the
# account. Use your noreply address from GitHub → Settings → Emails
# ("Keep my email addresses private"), typically:
#   {id}+{login}@users.noreply.github.com
# or {login}@users.noreply.github.com
# The PAT in DC_PAT must belong to this same user (or have push access).
gitAuthor: "HumfDev"
gitEmail: "143867285+HumfDev@users.noreply.github.com"
