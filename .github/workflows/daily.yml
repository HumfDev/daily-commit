name: daily-commit

on:
  schedule:
    # Ticks every 2 hours; the actual decision to act (or not) happens
    # inside the script, gated by config.yml's runProbability/quietHours/
    # maxActionsPerDay. This is what makes real activity land at
    # unpredictable times instead of on a fixed clock.
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without pushing/creating anything (log only)"
        type: boolean
        default: false

permissions:
  # Needed to commit .dc-state.json back to this control repo.
  contents: write

concurrency:
  group: daily-commit
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    env:
      # Prefer DC_PAT (user PAT with access to all target repos). Fall back to
      # the workflow GITHUB_TOKEN so an empty secret never blanks out auth
      # entirely (that made `gh` think nobody was logged in).
      GH_TOKEN: ${{ secrets.DC_PAT || github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check auth
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_TOKEN is empty. Add a repository secret named DC_PAT (a PAT with contents/pull-requests/issues write on every repo in repos.yml)."
            exit 1
          fi
          gh auth status

      - name: Run daily-commit
        run: npx tsx src/index.ts run ${{ inputs.dry_run && '--dry-run' || '' }}
