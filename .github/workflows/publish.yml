name: publish

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  # Required for npm provenance / trusted publishing (OIDC).
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs a recent npm CLI.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build, test, pack, smoke-test
        run: bash scripts/publish.sh

      - name: Publish to npm
        env:
          # Optional classic token fallback (repo secret NPM_TOKEN).
          # Prefer configuring Trusted Publishing on npmjs.com for this
          # workflow (publish.yml) so OIDC works without a long-lived token.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            npm config set "//registry.npmjs.org/:_authToken" "$NPM_TOKEN"
          fi
          npm publish --access public
