name: unpublish-legacy

# One-shot: remove the mistaken create-daily-commit package from npm.
# Delete this workflow after it succeeds.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unpublish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Remove create-daily-commit from npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is missing" >&2
            exit 1
          fi
          npm config set "//registry.npmjs.org/:_authToken" "$NPM_TOKEN"
          echo "→ Current package metadata (if any):"
          npm view create-daily-commit name version time --json || true

          set +e
          echo "→ Attempt unpublish (may require OTP on some accounts)"
          npm unpublish create-daily-commit --force
          UNPUBLISH_STATUS=$?
          set -e

          if [ "$UNPUBLISH_STATUS" -eq 0 ]; then
            if npm view create-daily-commit version >/dev/null 2>&1; then
              echo "Package still visible after unpublish" >&2
              exit 1
            fi
            echo "✓ create-daily-commit unpublished"
            exit 0
          fi

          echo "→ Unpublish blocked; deprecating instead so installs warn users away"
          npm deprecate create-daily-commit@"*" "DEPRECATED: use the daily-commit package instead (npx daily-commit). create-daily-commit was published by mistake and should not be used."
          echo "✓ create-daily-commit deprecated"
