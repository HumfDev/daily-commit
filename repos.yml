# Target repositories daily-commit may act on.
# Each entry configures which actions are enabled and any per-repo overrides.
#
# Your `gh` login (or GH_TOKEN) must have `contents`, `pull-requests`, and
# `issues` write access to every repo listed here.

repos:
  - repo: "humfdev/test-repo"
    actions:
      commit: true
      pull_request: true
      review: true
      issue: true
    safePaths:
      - "docs/**"
      - "*.md"
      - "CHANGELOG.md"
    # Optional: command run inside a clone before push. Non-zero exit aborts.
    # verifyCommand: "npm test --silent"
