# Global settings for daily-commit. Per-repo overrides live in repos.example.yml.
#
# Run `npx dc onboard` to generate config.yml + repos.yml locally (gitignored).

runProbability: 0.35

# Hours (0-23, UTC) during which daily-commit will never act.
quietHours: [0, 1, 2, 3, 4, 5]

# Hard cap on total successful actions across all repos (after daily minimums).
maxActionsPerDay: 500

# Every selected repo gets at least this many successful actions per day.
# `dc run` catch-up processes all under-served repos in one invocation.
minActionsPerRepoPerDay: 1

actionWeights:
  commit: 3
  pull_request: 2
  review: 2
  issue: 1
  noop: 1

safePaths:
  - "docs/**"
  - "*.md"
  - "CHANGELOG.md"
  - ".github/**"

cooldownHours: 6

# Replace via `dc onboard` (GitHub → Settings → Emails for noreply address).
gitAuthor: "YOUR_GITHUB_USERNAME"
gitEmail: "YOUR_ID+YOUR_GITHUB_USERNAME@users.noreply.github.com"
